tasks:
  - id: smoke_example_title
    domain: example.com
    task_type: navigate
    description: "Navigate to example.com and verify the page title contains 'Example Domain'."
    start_url: https://example.com
    split: train
    smoke_only: true

  - id: smoke_httpbin_headers
    domain: httpbin.org
    task_type: extract
    description: "Navigate to httpbin.org/headers and extract the User-Agent value from the JSON response."
    start_url: https://httpbin.org/headers
    split: train
    smoke_only: true

  - id: wikipedia_search
    domain: wikipedia.org
    task_type: search
    description: "Go to en.wikipedia.org, search for 'Alan Turing', verify the article page loads."
    start_url: https://en.wikipedia.org
    split: train
    target_failure: ELEMENT_NOT_FOUND
    success_hints:
      expect_url_contains: "/wiki/"

  - id: github_navigate_repo
    domain: github.com
    task_type: navigate
    description: "Navigate to github.com/python/cpython and verify the repository title is visible."
    start_url: https://github.com
    split: train
    target_failure: TIMEOUT
    success_hints:
      expect_url_contains: "/cpython"

  - id: hacker_news_top
    domain: news.ycombinator.com
    task_type: extract
    description: "Go to Hacker News and extract the title of the #1 ranked story."
    start_url: https://news.ycombinator.com
    split: train
    success_hints:
      expect_body_contains: "Hacker News"

  - id: duckduckgo_search
    domain: duckduckgo.com
    task_type: search
    description: "Search DuckDuckGo for 'playwright browser automation' and verify results appear."
    start_url: https://duckduckgo.com
    split: heldout
    target_failure: ACTION_NO_EFFECT
    success_hints:
      expect_url_contains: "q="
    notes: "Stress case — flaky in headless (consent/SERP); not in train KPI. UI preset kept for manual demo."

  - id: brkb_heldout_nav
    domain: sec.gov
    task_type: navigate
    description: "Open SEC EDGAR company page for Berkshire Hathaway and verify 10-K filings are listed."
    start_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001067983&type=10-K
    split: heldout
    success_hints:
      expect_body_contains: "Berkshire"
      expect_url_contains: "browse-edgar"
    notes: "Context scaffolding (CIK start URL); no ticker branch in code; avoids browse-edgar search rate-limit."

  - id: forms_heldout
    domain: httpbin.org
    task_type: form
    description: "Submit a POST form on httpbin.org/forms/post with sample data."
    start_url: https://httpbin.org/forms/post
    split: heldout
    success_hints:
      expect_url_contains: "/post"
      expect_body_contains: "custname"

  - id: python_docs_heldout
    domain: docs.python.org
    task_type: navigate
    description: "Navigate to docs.python.org and verify Python documentation is visible."
    start_url: https://docs.python.org/3/
    split: heldout
    frozen_prompt: true
    success_hints:
      expect_body_contains: "Python"
    notes: "Frozen held-out — do not tune agent_plan prompt for this task after adding."

  - id: quotes_heldout
    domain: quotes.toscrape.com
    task_type: extract
    description: "Extract the text of the first quote on the page."
    start_url: https://quotes.toscrape.com/
    split: heldout
    success_hints:
      expect_body_contains: "quote"
    notes: "Domain diversity held-out; static HTML, no consent. Not used for prompt tuning."
